name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装 PlatformIO
        run: pip install platformio

      - name: 缓存 PlatformIO 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: 编译固件
        id: build
        run: |
          pio run 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: 显示编译错误
        if: failure()
        run: |
          echo "=== 编译错误摘要 ==="
          grep -E "error:|Error:|fatal error:" build.log || echo "无匹配的错误行"
          echo ""
          echo "=== 完整日志最后50行 ==="
          tail -50 build.log

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: 上传固件
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/*/firmware.bin
